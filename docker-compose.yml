# Local development database. This exists so `prisma migrate dev` (which
# auto-RESETS the target database on drift) runs against a throwaway local
# Postgres instead of the production Supabase DB.
#
#   Start:  cd packages/database && bun run db:up
#   Stop:   cd packages/database && bun run db:down
#
# Matches production's Postgres major version (17). Host port is 5433 because
# 5432 is already in use on this machine.

services:
  dev-db:
    image: postgres:17
    container_name: internity_dev_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internity_dev
    ports:
      - "5433:5432"
    volumes:
      - internity_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internity_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  internity_dev_pgdata:
